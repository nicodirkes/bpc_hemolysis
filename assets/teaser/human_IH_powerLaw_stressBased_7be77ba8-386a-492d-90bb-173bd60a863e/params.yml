---
species: human
model:
  name: IH_powerLaw_stressBased
  control_variables:
  - shear_stress
  - exposure_time
  use_julia: false
  n_workers: 1
calibration:
  nwalkers: 100
  nburn: 2500
  nsteps: 5000
  n_workers: 1
  pool_type: serial
  parameters:
  - A
  - alpha
  - beta
  noise_parameters:
  - sigma
  calibrate_noise: true
  noise_sigma: 0.05
  data:
  - fHb
  likelihood: normal
  priors:
  - name: A
    distribution:
      type: uniform
      attribute:
        lower_bound: 1.0E-7
        upper_bound: 20.0
  - name: alpha
    distribution:
      type: uniform
      attribute:
        lower_bound: 0.5
        upper_bound: 3.0
  - name: beta
    distribution:
      type: uniform
      attribute:
        lower_bound: 0.01
        upper_bound: 1.0
  - name: sigma
    distribution:
      type: uniform
      attribute:
        lower_bound: 1.0E-9
        upper_bound: 0.5

