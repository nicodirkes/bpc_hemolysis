name: Build module images

# Build and push a container image per conda module to GHCR, for --containerized
# runs. Lockable modules are built from their committed linux-64 lock (pinned);
# modules with a Dockerfile (pip deps) are built from it. Tags: latest + sha.
# model_julia has its own build workflow and is skipped (no environment.yml).

on:
  push:
    branches: [main]
    paths:
      - '**/environment.yml'
      - '**/lockfile/**'
      - '**/Dockerfile'
      - '.github/templates/**'
      - '.github/workflows/build-module-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          mods=$(find . -mindepth 2 -maxdepth 2 -name environment.yml -printf '%h\n' \
                 | sed 's|^\./||' | sort | jq -R . | jq -cs .)
          echo "modules=$mods" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Modules with a Dockerfile build from it (context = module dir); lockable
      # modules build from their linux-64 lock via the shared template.
      - name: Resolve build source
        id: src
        run: |
          m="${{ matrix.module }}"
          if [ -f "$m/Dockerfile" ]; then
            echo "context=$m"               >> "$GITHUB_OUTPUT"
            echo "dockerfile=$m/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            cp .github/templates/micromamba-lock.Dockerfile "$m/lockfile/Dockerfile"
            echo "context=$m/lockfile"               >> "$GITHUB_OUTPUT"
            echo "dockerfile=$m/lockfile/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.module }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.src.outputs.context }}
          file: ${{ steps.src.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
