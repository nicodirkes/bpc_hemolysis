name: Update Conda locks & Dockerfiles

# Whenever an environment.yml changes, refresh each conda module's build recipe:
# per-platform explicit locks for lockable modules, or a micromamba Dockerfile
# for modules with pip deps (see .github/scripts/update-locks.sh). New modules
# are picked up automatically; model_julia (no environment.yml) is skipped.

on:
  push:
    branches: [main]
    paths:
      - '**/environment.yml'
      - '.github/scripts/update-locks.sh'
      - '.github/templates/micromamba-env.Dockerfile'
      - '.github/workflows/update-conda-lock.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-recipes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: true

      - name: Install conda-lock
        shell: bash -el {0}
        run: conda install -y conda-lock

      - name: Regenerate locks / Dockerfiles
        shell: bash -el {0}
        run: bash .github/scripts/update-locks.sh

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A '**/lockfile/*.lock' '**/Dockerfile'
          git diff --staged --quiet || git commit -m "chore: update conda locks & Dockerfiles [skip ci]"
          git push
